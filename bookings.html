<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"/>
    <title>Bookings</title>
</head>
<body>
    <header class="header"> 

     <!-- website name -->
      <div class="logo">
       <img id="img-tree" src="tree.webp" alt="acacia tree"/>
       <h1>Savannah Bookings</h1>
      </div>

      <!-- navigation panel -->
    <nav>
        <ul class="menu">
          <li class="menu-li">
            <a href="index.html">Home</a>
          </li>
          <li class="menu-li">
            <a href="contact.html">Contact Us</a>
          </li>
        </ul>
      </nav>
   </header> 

    <!-- Hotel Type Selection -->
    <label>Select Hotel Type:</label>
    <select id="hotelType" onchange="showHotels()">
        <option value="">--Choose--</option>
        <option value="domestic">Domestic</option>
        <option value="international">International</option>
    </select>

    <br><br>

    <!-- Domestic Hotels -->
    <div id="domesticHotels" class="hidden">
        <label>Select Domestic Hotel:</label>
        <select>
            <option>Nairobi Serena</option>
            <option>Sarova Stanley</option>
            <option>Voyager Beach Resort</option>
        </select>
    </div>

    <!-- International Hotels -->
    <div id="internationalHotels" class="hidden">
        <label>Select International Hotel:</label>
        <select>
            <option>Hilton Paris</option>
            <option>Marriott New York</option>
            <option>Burj Al Arab Dubai</option>
        </select>
    </div>

    <br><br>

    <!-- Dates -->
    <label>Check-in Date:</label>
    <input type="date" id="checkin">

    <br><br>

    <label>Check-out Date:</label>
    <input type="date" id="checkout">

    <br><br>

    <!-- Book Button -->
    <button onclick="bookHotel()">Book Now</button>

    <p id="message"></p>

    <!-- Link external JS -->
    <script src="booking.js"></script>

</body>
</html>
