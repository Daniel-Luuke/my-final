<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Bookings</title>
  </head>
  <body>
    <header class="header">
      <!-- website name -->
      <div class="logo">
        <img id="img-tree" src="tree.webp" alt="acacia tree" />
        <h1>Savannah Bookings</h1>
      </div>

      <!-- navigation panel -->
      <nav>
        <ul class="menu">
          <li class="menu-li">
            <a href="index.html">Home</a>
          </li>
          <li class="menu-li">
            <a href="contact.html">Contact Us</a>
          </li>
        </ul>
      </nav>
    </header>

    <section>
      <form onsubmit="bookHotel(event)">
        <!-- Hotel Type -->
        <label>Select Hotel Type:</label>
        <select id="hotelType">
          <option value="">--Choose--</option>
          <option value="domestic">Domestic</option>
          <option value="international">International</option>
        </select>

        <br /><br />

        <!-- Single Hotel Dropdown -->
        <label>Select Hotel:</label>
        <select id="hotelSelect">
          <option value="">--Select a hotel--</option>
        </select>

        <br /><br />

        <!-- Dates -->
        <label>Check-in Date:</label>
        <input type="date" id="checkin" />

        <br /><br />

        <label>Check-out Date:</label>
        <input type="date" id="checkout" />

        <br /><br />

        <!-- Book Button -->
        <button onclick="bookHotel()">Book Now</button>
      </form>
        <p id="message"></p>
      
    </section>

    <script src="booking.js"></script>
  </body>
</html>
